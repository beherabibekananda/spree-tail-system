{% extends 'base.html' %}

{% block title %}Login | Spreetail Shared Expenses{% endblock %}

{% block content %}
<div class="max-w-md w-full mx-auto my-12">
    <div class="glass p-8 rounded-3xl border border-white/5 shadow-2xl relative overflow-hidden">
        <!-- Background glows -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-brand-500/10 rounded-full blur-2xl"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-indigo-500/10 rounded-full blur-2xl"></div>

        <div class="text-center mb-8 relative">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-brand-500 to-indigo-500 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-brand-500/10">
                <i class="fa-solid fa-lock text-white text-lg"></i>
            </div>
            <h2 class="text-2xl font-bold bg-gradient-to-r from-brand-500 to-indigo-400 bg-clip-text text-transparent">Welcome Back</h2>
            <p class="text-slate-400 text-sm mt-1">Sign in to manage shared household expenses</p>
        </div>

        <form method="POST" action="{% url 'login' %}" class="space-y-6 relative">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label for="id_username" class="text-sm font-semibold text-slate-300">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" name="username" id="id_username" required
                           class="w-full bg-slate-950 border border-white/10 rounded-2xl pl-11 pr-4 py-3 text-white placeholder-slate-500 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none transition-all"
                           placeholder="Enter your username">
                </div>
            </div>

            <div class="space-y-2">
                <label for="id_password" class="text-sm font-semibold text-slate-300">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                        <i class="fa-solid fa-key"></i>
                    </span>
                    <input type="password" name="password" id="id_password" required
                           class="w-full bg-slate-950 border border-white/10 rounded-2xl pl-11 pr-4 py-3 text-white placeholder-slate-500 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none transition-all"
                           placeholder="Enter your password">
                </div>
            </div>

            <button type="submit"
                    class="w-full btn-gradient font-bold py-3.5 px-4 rounded-2xl transition-all transform active:scale-[0.98]">
                Sign In
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-slate-400 border-t border-white/5 pt-6 relative">
            Don't have an account? 
            <a href="{% url 'register' %}" class="text-brand-500 hover:text-brand-400 font-semibold transition-colors">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
